name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && inputs.target || 'staging' }}
  cancel-in-progress: false

jobs:
  staging:
    name: Deploy staging
    if: ${{ github.event_name == 'push' || inputs.target == 'staging' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Apply staging D1 migrations
        run: npx wrangler d1 migrations apply DB --env staging --remote

      - name: Deploy staging
        run: npm run deploy:staging

      - name: Smoke test staging
        run: npm run smoke:staging

  production:
    name: Deploy production
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'production' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Apply production D1 migrations
        run: npx wrangler d1 migrations apply DB --remote

      - name: Deploy production
        run: npm run deploy
